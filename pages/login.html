<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login Page</title>
    <link rel="stylesheet" href="./../css/login.css">
</head>

<body>

    <div class="container">


        <!-- Login Form -->
        <form class="loginbox" id="loginForm">
            <img src="./../images/imagebc.jpeg" alt="ladyimage" class="image" />
            <br />
            <h2 style="color:#6474eb">Login</h2>

            <input type="text" id="loginMobile" placeholder=" Enter Mobile Number" required>

            <div class="password-box">

                <input type="password" id="loginPassword" class="password-input" placeholder=" Enter Password" required>
                <img src="./../images/hide.png" onclick="toggleLoginPassword()" class="eye-icon" alt="hideicon"
                    id="loginEye">

                <button type="button" class="eye-btn" onclick="toggleLoginPassword()">

                    <i class="fa-solid fa-eye" id="loginEye"></i>

                </button>

            </div>

            <button type="submit">
                Login
            </button>

            <p>
                Don't have an account?
                <span onclick="showRegister()">
                    Register
                </span>
            </p>

        </form>

        <!-- Register Form -->
        <form id="registerForm">

            <h2 style="color:#6474eb">Register</h2>

            <input type="text" id="name" placeholder=" Enter Full Name" required>

            <input type="email" id="registerEmail" placeholder=" EnterEmail Address" required>

            <input type="text" id="registerMobile" placeholder=" Enter Mobile Number" required>

            <div class="password-box">

                <input type="password" id="registerPassword" placeholder=" Enter Password" required>
                <img src="./../images/hide.png" onclick="toggleRegisterPassword()" class="eye-icon" alt="hideicon"
                    id="registerEye">

                <button type="button" class="eye-btn" onclick="toggleRegisterPassword()">

                    <i class="fa-solid fa-eye" id="registerEye"></i>

                </button>

            </div>

            <button type="submit">
                Register →
            </button>

            <p>
                Already have an account?
                <span onclick="showLogin()">
                    Login
                </span>
            </p>

        </form>

    </div>

    <script src="./../js/login.js"></script>
</body>

</html>

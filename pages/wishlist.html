<!DOCTYPE html>
<html>
<head>
    <title>My Wishlist</title>
    <link rel="stylesheet" href="./../css/wishlist.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="wishlist-container">
    <section class="page-header">
        <div>
            <h1>My Wishlist</h1>
            <p>Manage your favorite products</p>
        </div>
        <a href="./../pages/product.html" class="shopping-btn"> Continue Shopping</a>
    </section>
    <section class="toolbar">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text"id="searchInput" placeholder="Search wishlist..." >
        </div>
        <div class="sort-box">
            <select id="sortSelect">
                <option value="latest">Recently Added</option>
                <option value="oldest">Oldest Added</option>
                <option value="nameAsc"> Name A-Z </option>
                <option value="nameDesc">Name Z-A </option>
                <option value="priceLow"> Price Low → High </option>
                <option value="priceHigh"> Price High → Low </option>
            </select>
        </div>
    </section>

    <section class="summary-grid">
        <div class="summary-card">
            <div class="summary-icon">
                <i class="fa-regular fa-heart"></i>
            </div>
            <div>
                <h3 id="totalItems">0</h3>
                <p>Total Items</p>
            </div>
        </div>
        <div class="summary-card">
            <div class="summary-icon">
                <i class="fa-solid fa-indian-rupee-sign"></i>
            </div>
            <div>
                <h3 id="estimatedTotal">₹0</h3>
                <p>Estimated Total</p>
            </div>
        </div>
        <div class="summary-card">
            <div class="summary-icon">
                <i class="fa-solid fa-tags"></i>
            </div>
            <div>
                <h3 id="totalSavings">₹0</h3>
                <p>Total Savings</p>
            </div>
        </div>
        <div class="summary-card">
            <div class="summary-icon">
                <i class="fa-solid fa-check"></i>
            </div>
            <div>
                <h3 id="selectedItems">0</h3>
                <p>Selected</p>
            </div>
        </div>
    </section>

     <section class="bulk-actions">
        <button id="toggleSelectBtn" class="btn secondary-btn"> Select All </button>
        <div class="action-buttons">
            <button id="moveSelectedBtn" class="btn primary-btn"><i class="fa-solid fa-cart-shopping"></i> Move Selected To Cart</button>
            <button id="removeSelectedBtn" class="btn danger-btn"><i class="fa-solid fa-trash"></i>Remove Selected </button>
        </div>
    </section>

    <section class="share-section">
        <h2>Share Wishlist</h2>
        <div class="share-buttons">
            <button id="copyLinkBtn" class="btn primary-btn" ><i class="fa-solid fa-link"></i> Copy Link </button>
            <button id="whatsappBtn" class="btn whatsapp-btn"><i class="fa-brands fa-whatsapp"></i> WhatsApp Share </button>
        </div>
    </section>

    <section id="wishlistGrid" class="wishlist-grid">
    </section>

    <section id="emptyState" class="empty-state">
        <div class="empty-card">
            <div class="empty-icon"> ♡</div>
            <h2>Your Wishlist Is Empty</h2>
            <p>Start saving products you love.</p>
            <a href="products.html"class="empty-btn">Continue Shopping </a>
        </div>
    </section>
</div>
</body>
</html>
